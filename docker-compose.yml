version: '3.8'

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    # 关键：只绑定到 loopback，不暴露到公网
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      # 持久化配置和数据
      - openclaw-data:/home/openclaw/.openclaw
      - ~/.openclaw:/home/openclaw/.openclaw:rw
    environment:
      - NODE_ENV=production
      # 可选：设置 Token（如果不设置，运行 onboard 后会生成）
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:18789/health"]
      interval: 15s
      timeout: 3s
      retries: 6
    networks:
      - openclaw-network

  # 可选：使用 Ollama 本地模型
  ollama:
    image: ollama/ollama:latest
    container_name: openclaw-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    # 如需 GPU 加速，取消下面注释
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - openclaw-network

  # Let's Encrypt + Nginx 自动证书管理
  nginx-proxy:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - openclaw-gateway
    networks:
      - openclaw-network

  certbot:
    image: certbot/certbot:latest
    container_name: openclaw-certbot
    restart: unless-stopped
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # 自动续期证书（每天检查）
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  openclaw-data:
  ollama-data:
  certbot-data:
  certbot-www:

networks:
  openclaw-network:
    driver: bridge
