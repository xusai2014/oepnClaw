version: '3.9'

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_HOST=0.0.0.0
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OLLAMA_API_BASE=http://ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "127.0.0.1:18789:18789"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /home/node/.openclaw

        # 强制写入最小有效 config（避免 bind invalid / mode 未启用）
        cat > /home/node/.openclaw/openclaw.json <<'EOF'
        {
          "gateway": {
            "mode": "local",
            "bind": "lan",
            "port": 18789,
            "auth": {
              "mode": "token",
              "token": "ENV_TOKEN_PLACEHOLDER"
            },
            "controlUi": {
              "enabled": true,
              "allowInsecureAuth": true,
              "allowedOrigins": [
                "https://example.cc",
                "https://www.example.cc",
                "http://example.cc",
                "http://www.example.cc",
                "http://localhost:18789",
                "http://127.0.0.1:18789"
              ]
            }
          }
        }
        EOF

        # 用环境变量替换 token（防止 .env 不生效或覆盖问题）
        sed -i "s/ENV_TOKEN_PLACEHOLDER/${OPENCLAW_GATEWAY_TOKEN}/g" /home/node/.openclaw/openclaw.json

        # 启动 gateway（镜像默认命令）
        exec node dist/index.js gateway
    volumes:
      - ./openclaw-data:/home/node/.openclaw
      - ./openclaw-workspace:/home/node/.openclaw/workspace
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18789/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s

  ollama:
    image: docker.1ms.run/ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS=*
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot-etc:/etc/letsencrypt:ro
      - ./certbot-var:/var/www/certbot
    depends_on:
      - openclaw-gateway
    networks:
      - openclaw-net

  certbot:
    image: certbot/certbot
    container_name: openclaw-certbot
    restart: unless-stopped
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    volumes:
      - ./certbot-etc:/etc/letsencrypt
      - ./certbot-var:/var/www/certbot
    networks:
      - openclaw-net

volumes:
  openclaw-data:
  openclaw-workspace:
  ollama-data:
  certbot-etc:
  certbot-var:

networks:
  openclaw-net:
    driver: bridge
