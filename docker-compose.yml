version: '3.8'

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # 关键：绑定到所有接口，允许 Nginx 连接
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - OPENCLAW_GATEWAY_PORT=18789
      # Token 通过环境变量传入（可选）
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      # API Keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      # 宿主机本地访问（安全）
      - "127.0.0.1:18789:18789"
    expose:
      # 容器间通信（Nginx 使用）
      - "18789"
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18789/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  ollama:
    image: docker.1ms.run/ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # GPU 支持（可选）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - openclaw-network

  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx 配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 关键：正确挂载证书（使用 bind mount）
      - ./certbot-data:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot
    depends_on:
      - openclaw-gateway
    networks:
      - openclaw-network

  certbot:
    image: certbot/certbot:latest
    container_name: openclaw-certbot
    # 关键：不使用 entrypoint，允许手动运行命令
    entrypoint: ["/bin/sh", "-c"]
    command: ["trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;"]
    volumes:
      - ./certbot-data:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot

volumes:
  openclaw-data:
  ollama-data:
  openclaw-workspace:
  certbot-data:
  certbot-www:

networks:
  openclaw-network:
    driver: bridge
