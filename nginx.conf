# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name flygpt.cc www.flygpt.cc;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 服务
server {
    listen 443 ssl http2;
    server_name flygpt.cc www.flygpt.cc;

    # SSL 证书路径（首次运行 certbot 后生成）
    ssl_certificate /etc/letsencrypt/live/flygpt.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flygpt.cc/privkey.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 反向代理到 OpenClaw Gateway
    location / {
        proxy_pass http://openclaw-gateway:18789;
        proxy_http_version 1.1;

        # WebSocket 支持（必需）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 转发真实 IP 和协议
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
